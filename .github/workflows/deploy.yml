name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Run full test suite before deploy ──────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Create fixture directories
        run: |
          mkdir -p data/policies data/rules data/evaluations data/claims data/vector_store prompts
          cp policy_terms.json data/policies/ 2>/dev/null || true
          cp adjudication_rules.md data/rules/ 2>/dev/null || true
          cp test_cases.json data/evaluations/ 2>/dev/null || true

      - name: Create CI .env
        run: |
          cat > .env << 'EOF'
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}
          DATABASE_URL=sqlite:///./data/claims_test.db
          LOG_LEVEL=WARNING
          EOF

      - run: python -m pytest tests/ -v --tb=short --timeout=120

  # ── 2. Build & push Docker image ─────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Build frontend & push static assets ───────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.plum-opd.example.com' }}

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── 4. Deploy ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker, frontend]
    environment: production

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist/

      - name: Deploy backend (Railway / Render / Fly.io)
        run: |
          echo "🚀 Deploying backend image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # Uncomment and configure ONE of the platforms below:

          # ── Railway ──
          # curl -fsSL https://railway.app/install.sh | sh
          # railway deploy --service backend --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          # ── Render ──
          # curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

          # ── Fly.io ──
          # curl -L https://fly.io/install.sh | sh
          # flyctl deploy --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          echo "ℹ️  Configure your deployment platform's secret and uncomment the relevant section above."

      - name: Deploy frontend to Vercel / Netlify / S3
        run: |
          echo "🚀 Deploying frontend static files..."
          ls frontend-dist/

          # ── Vercel ──
          # npm install -g vercel
          # vercel deploy frontend-dist/ --token=${{ secrets.VERCEL_TOKEN }} --prod

          # ── Netlify ──
          # npm install -g netlify-cli
          # netlify deploy --dir=frontend-dist --prod --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=${{ secrets.NETLIFY_SITE_ID }}

          echo "ℹ️  Configure your hosting platform's secret and uncomment the relevant section above."

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment complete!"
          echo "Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "Git SHA: ${{ github.sha }}"
